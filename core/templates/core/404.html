{% extends 'base.html' %}
{% block title %}404 — Page Not Found{% endblock %}
{% block theme_css %}
<style>body { background: #0a0a14; color: #e8eaf6; }</style>
{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="text-center">
    <div class="text-9xl font-black mb-4" style="background: linear-gradient(135deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">404</div>
    <h1 class="text-3xl font-bold text-white mb-3">Page Not Found</h1>
    <p class="text-gray-400 mb-8">The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="inline-flex items-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-3 rounded-xl font-semibold transition-colors">
      <i class="fas fa-home"></i> Go Home
    </a>
  </div>
</div>
{% endblock %}
