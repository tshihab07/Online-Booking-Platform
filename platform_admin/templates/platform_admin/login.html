{% extends 'base.html' %}

{% block theme_css %}
<style>
  :root {
    --color-primary: #6366f1;
    --color-secondary: #8b5cf6;
    --color-bg: #0f0f1a;
    --color-surface: #1a1a2e;
    --color-surface-2: #16213e;
    --color-border: #2a2a4a;
    --color-text: #e8eaf6;
    --color-text-muted: #7986cb;
  }
  body { background: var(--color-bg); color: var(--color-text); min-height: 100vh; }
  .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 20px; padding: 40px; width: 100%; max-width: 420px; }
  .form-input {
    background: var(--color-surface-2); border: 1px solid var(--color-border);
    color: var(--color-text); border-radius: 10px; padding: 12px 16px; width: 100%;
    transition: border-color 0.2s; font-size: 14px;
  }
  .form-input:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
  .btn-primary {
    background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
    color: white; padding: 12px 24px; border-radius: 10px; font-weight: 600;
    transition: opacity 0.2s; border: none; cursor: pointer; width: 100%; font-size: 15px;
  }
  .btn-primary:hover { opacity: 0.9; }
  .alert-error { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); padding: 12px 16px; border-radius: 10px; margin-bottom: 20px; font-size: 14px; }
</style>
{% endblock %}

{% block content %}
<div class="login-container">
  <div class="login-card">
    <div class="text-center mb-8">
      <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-red-600 to-orange-500 flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-shield-halved text-white text-2xl"></i>
      </div>
      <h1 class="text-2xl font-bold">KGB Admin Panel</h1>
      <p class="text-sm text-[var(--color-text-muted)] mt-1">Restricted access — authorised personnel only</p>
    </div>

    {% if error %}
    <div class="alert-error">{{ error }}</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-2">Username</label>
          <input type="text" name="username" class="form-input" placeholder="admin username" autocomplete="username" required>
        </div>
        <div>
          <label class="block text-sm font-medium mb-2">Password</label>
          <input type="password" name="password" class="form-input" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-primary mt-4">Sign In</button>
      </div>
    </form>

    <p class="text-center text-sm text-[var(--color-text-muted)] mt-6">
      <a href="{% url 'core:home' %}" class="text-indigo-400 hover:underline">← Back to Home</a>
    </p>
  </div>
</div>
{% endblock %}
